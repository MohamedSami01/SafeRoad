<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد البلاغ - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./reporting.css">
</head>
<body data-page="reporting">
  <div class="app-frame">

    <main class="screen report-confirm">

      <div class="report-confirm__icon" aria-hidden="true">✅</div>
      <h1>تم إرسال بلاغك بنجاح</h1>
      <p>شكرًا لمساهمتك في سلامة الطريق</p>

      <div class="report-ref card card-signature">
        <div class="report-ref__row">
          <span>رقم البلاغ المرجعي</span>
          <strong id="reportId">#000000</strong>
        </div>
        <div class="report-ref__row">
          <span>الحالة</span>
          <span class="badge badge-accent" id="reportStatus">قيد المراجعة</span>
        </div>
      </div>

      <div class="report-confirm__actions">
        <button class="btn btn-outline" onclick="location.href='./reports-history.html'">عرض كل بلاغاتي السابقة</button>
        <button class="btn btn-primary" onclick="location.href='../home/home.html'">رجوع للرئيسية</button>
      </div>

    </main>

  </div>

  <script src="../../js/storage.js"></script>
  <script src="./report-confirm.js"></script>
</body>
</html>
