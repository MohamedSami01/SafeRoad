<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./auth.css">
</head>
<body data-page="auth">
  <div class="app-frame auth">
    <button class="btn-text auth__back" onclick="goBack()">→ رجوع</button>

    <div class="auth__header">
      <h1>إنشاء حساب جديد</h1>
      <p>انضم إلينا وكن جزءًا من طريق أكثر أمانًا</p>
    </div>

    <form id="signupForm" class="auth__form">
      <div class="field">
        <label for="fullName">الاسم الكامل</label>
        <input type="text" id="fullName" name="fullName" placeholder="اسمك" required>
      </div>

      <div class="field">
        <label for="emailOrPhone">البريد الإلكتروني أو رقم الهاتف</label>
        <input type="text" id="emailOrPhone" name="emailOrPhone" placeholder="example@email.com" required>
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
    </form>

    <p class="auth__switch">
      لديك حساب بالفعل؟
      <a href="./login.html">تسجيل الدخول</a>
    </p>
  </div>

  <script src="../../js/navigation.js"></script>
  <script src="../../js/storage.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
