<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./auth.css">
</head>
<body data-page="auth">
  <div class="app-frame auth">
    <div class="auth__header">
      <div class="auth__logo" aria-hidden="true">🛡️</div>
      <h1>أهلاً بك</h1>
      <p>سجّل دخولك لحفظ تقدمك ونقاطك وبلاغاتك</p>
    </div>

    <form id="loginForm" class="auth__form">
      <div class="field">
        <label for="emailOrPhone">البريد الإلكتروني أو رقم الهاتف</label>
        <input type="text" id="emailOrPhone" name="emailOrPhone" placeholder="example@email.com" required>
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <a href="#" class="auth__forgot">نسيت كلمة المرور؟</a>

      <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
    </form>

    <div class="auth__divider"><span>أو</span></div>

    <div class="auth__social">
      <button class="btn btn-outline">المتابعة بحساب جوجل</button>
      <button class="btn btn-outline">المتابعة بحساب آبل</button>
    </div>

    <button class="btn btn-text auth__guest" id="guestBtn">الدخول كزائر</button>

    <p class="auth__switch">
      ليس لديك حساب؟
      <a href="./signup.html">إنشاء حساب جديد</a>
    </p>
  </div>

  <script src="../../js/storage.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
