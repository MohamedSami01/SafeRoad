<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتيجة الاختبار - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./challenges.css">
</head>
<body data-page="challenges">
  <div class="app-frame">

    <main class="screen quiz-result">

      <div class="result__celebrate" aria-hidden="true">🎉</div>
      <h1>أحسنت!</h1>
      <p class="result__score" id="scoreText">4 من 5 إجابات صحيحة</p>

      <div class="points-earned card card-signature">
        <span>النقاط المكتسبة</span>
        <strong id="pointsEarned">+50</strong>
      </div>

      <div class="certificate card card-signature" id="certificateBox">
        <div class="certificate__badge">🏅</div>
        <h3>شهادة تقدير</h3>
        <p>لإتمامك اختبار "مخاطر القيادة تحت التأثير" بنجاح</p>
      </div>

      <div class="result__actions">
        <button class="btn btn-accent" id="shareResultBtn">شارك نتيجتك مع أصحابك</button>
        <button class="btn btn-outline" onclick="location.href='./quiz-list.html'">اختبار آخر</button>
        <button class="btn-text" onclick="location.href='../home/home.html'">رجوع للرئيسية</button>
      </div>

    </main>

  </div>

  <script src="../../js/storage.js"></script>
  <script src="./quiz-result.js"></script>
</body>
</html>
