<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحديات والمسابقات - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./challenges.css">

<body data-page="challenges">
  <div class="app-frame">

    <header class="top-bar">
      <button class="btn-text" onclick="goBack()">→</button>
      <span class="top-bar__title">التحديات والمسابقات</span>
      <span style="width:24px"></span>
    </header>

    <main class="screen">

      <section class="daily-challenge card card-signature">
        <span class="badge badge-accent">تحدي اليوم</span>
        <h3>اختبار: مخاطر القيادة تحت التأثير</h3>
        <p>5 أسئلة • 50 نقطة</p>
        <button class="btn btn-primary" onclick="location.href='./quiz-question.html?quiz=daily'">ابدأ التحدي</button>
      </section>

      <h3>كل الاختبارات</h3>

      <div class="quiz-card card card-signature" onclick="location.href='./quiz-question.html?quiz=traffic1'">
        <div class="quiz-card__info">
          <span class="badge badge-primary">سلامة مرورية</span>
          <h3>أساسيات السلامة على الطريق</h3>
          <p>8 أسئلة • 80 نقطة</p>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width: 100%"></div></div>
      </div>

      <div class="quiz-card card card-signature" onclick="location.href='./quiz-question.html?quiz=addiction1'">
        <div class="quiz-card__info">
          <span class="badge badge-primary">مكافحة الإدمان</span>
          <h3>تعرف على مخاطر الإدمان</h3>
          <p>6 أسئلة • 60 نقطة</p>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width: 40%"></div></div>
      </div>

      <div class="quiz-card card card-signature" onclick="location.href='./quiz-question.html?quiz=weekly1'">
        <div class="quiz-card__info">
          <span class="badge badge-accent">تحدي الأسبوع</span>
          <h3>اختبار شامل: أمان الطريق</h3>
          <p>10 أسئلة • 120 نقطة</p>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width: 0%"></div></div>
      </div>

    </main>

    <nav class="bottom-nav">
      <button class="bottom-nav__item" data-page="home" data-href="../home/home.html">
        <span class="bottom-nav__icon">🏠</span><span>الرئيسية</span>
      </button>
      <button class="bottom-nav__item" data-page="accidents" data-href="../accidents/accidents-home.html">
        <span class="bottom-nav__icon">🚦</span><span>الحوادث</span>
      </button>
      <button class="bottom-nav__item" data-page="addiction" data-href="../addiction/addiction-home.html">
        <span class="bottom-nav__icon">🛡️</span><span>الإدمان</span>
      </button>
      <button class="bottom-nav__item" data-page="help" data-href="../help/help-map.html">
        <span class="bottom-nav__icon">📍</span><span>المساعدة</span>
      </button>
      <button class="bottom-nav__item" data-page="account" data-href="../account/profile.html">
        <span class="bottom-nav__icon">👤</span><span>حسابي</span>
      </button>
    </nav>

  <script src="../../js/storage.js"></script>
  <script src="../../js/navigation.js"></script>
